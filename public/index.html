<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Email Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 text-slate-800">

    <div class="bg-white max-w-2xl w-full rounded-3xl shadow-xl p-8 sm:p-10 transition-all border border-slate-100">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center p-3 bg-blue-50 rounded-2xl mb-4">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">AI Email Intelligence</h1>
            <p class="text-slate-500 font-medium">Instantly condense lengthy emails into concise summaries and actionable items.</p>
        </div>

        <!-- Textarea -->
        <div class="mb-6">
            <textarea id="emailInput" class="w-full h-40 p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none resize-none transition-all text-slate-700" placeholder="Paste the email content here..."></textarea>
        </div>

        <!-- Main Button -->
        <button onclick="processEmail()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 flex justify-center items-center gap-2">
            Generate Insights
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </button>

        <!-- Loading Text -->
        <div id="loadingText" class="hidden text-center text-blue-600 font-medium mt-6 animate-pulse flex justify-center items-center gap-2">
            <svg class="animate-spin h-5 w-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            Analyzing content...
        </div>

        <!-- Result Box -->
        <div id="resultBox" class="hidden mt-8 p-6 bg-slate-50 border border-slate-100 rounded-2xl">
            
            <h3 class="text-sm uppercase tracking-wider font-bold text-slate-400 mb-2">Executive Summary</h3>
            <p id="summaryText" class="text-slate-700 leading-relaxed mb-6 font-medium"></p>

            <h3 class="text-sm uppercase tracking-wider font-bold text-slate-400 mb-2">Action Items</h3>
            <ul id="actionItemsList" class="list-none text-slate-700 space-y-3 mb-2"></ul>
            
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        async function processEmail() {
            const emailText = document.getElementById("emailInput").value;
            if(!emailText) { alert("Please paste an email to process."); return; }

            document.getElementById("loadingText").classList.remove("hidden");
            document.getElementById("resultBox").classList.add("hidden");

            try {
                const response = await fetch('/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailText })
                });
                const data = await response.json();

                document.getElementById("loadingText").classList.add("hidden");
                document.getElementById("resultBox").classList.remove("hidden");
                
                document.getElementById("summaryText").innerText = data.summary;

                const ul = document.getElementById("actionItemsList");
                ul.innerHTML = ""; 

                if (data.action_items) {
                    let items = data.action_items;
                    if(typeof items === 'string') items = items.split('\n');
                    
                    items.forEach(item => {
                        let li = document.createElement("li");
                        li.className = "flex items-start gap-2";
                        let cleanText = item.replace("-", "").trim();
                        li.innerHTML = `<svg class="w-5 h-5 text-green-500 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> <span>${cleanText}</span>`;
                        ul.appendChild(li);
                    });
                }
            } catch (error) {
                alert("An error occurred while communicating with the AI server.");
                document.getElementById("loadingText").classList.add("hidden");
            }
        }
    </script>
</body>
</html>
